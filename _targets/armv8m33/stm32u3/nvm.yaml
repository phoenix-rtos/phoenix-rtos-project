flash0:
  # internal flash - assume the target image can't exceed one bank
  # size: 0x20000 # 128 KB on STM32U335xx / STM32U345xx
  # size: 0x40000 # 256 KB on STM32U356xx / STM32U366xx
  size: 0x80000 # 512 KB on STM32U375xx / STM32U385xx
  # size: 0xC0000 # 768 KB on STM32U396xx / STM32U3A6xx
  # size: 0x100000 # 1 MB on STM32U3B5xx / STM32U3C5xx
  block_size: 0x100 # program page size
  padding_byte: 0xff
  partitions:
    - name: plo
      offs: 0x0
    - name: user
      offs: 0xc800
      # if size not set - last non-virtual partition will be extnded to the end of flash

    # virtual offset [user.offs] + [user.script.size]
    - name: kernel
      offs: 0xd000
      virtual: True
