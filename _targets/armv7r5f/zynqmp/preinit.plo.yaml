size: 0x1000
is_relative: False

contents:
  - map tcm 0x0 0x40000 rwx # 0 ~ 256 KB
  - map kddr 0x100000 0x2fffff rwx # 1 ~ 3 MB
  - map ddr 0x300000 0x1fffffff rwx # 3 ~ 512 MB
  - phfs uart0 0.0 phoenixd
  - phfs uart1 0.1 raw
  - phfs flash0 2.0 raw
  - phfs ramdisk 4.0 raw
  - console 0.1

  - if: '{{ not(env.RAM_SCRIPT) | default(false) }}'
    action: call
    set_base: True
    device: '{{ env.BOOT_DEVICE }}'
    filename: user.plo
    offset: '{{ nvm.flash0.kernel.offs }}'
    target_magic: '{{ env.MAGIC_USER_SCRIPT }}'
